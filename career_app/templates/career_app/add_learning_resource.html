<h1>Add Learning Resource</h1>

<form method="POST">
    {% csrf_token %}

    <label>Resource Title</label><br>
    <input type="text" name="title" required><br><br>

    <label>Resource URL</label><br>
    <input type="url" name="url" required><br><br>

    <label>Select Skill</label><br>
    <select name="skill" required>
        <option value="">-- Select Skill --</option>
        {% for skill in skills %}
            <option value="{{ skill.id }}">{{ skill.skill_name }}</option>
        {% endfor %}
    </select>

    <br><br>
    <button type="submit">Add Resource</button>
</form>

<br>
<a href="{% url 'admin_dashboard' %}">Back to Admin Dashboard</a>
