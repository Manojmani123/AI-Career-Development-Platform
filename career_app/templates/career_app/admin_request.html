<h1>Admin Registration Request</h1>

<form method="POST">
    {% csrf_token %}

    <label>Full Name</label><br>
    <input type="text" name="full_name" required><br><br>

    <label>Email</label><br>
    <input type="email" name="email" required><br><br>

    <button type="submit">
        Submit Request
    </button>
</form>
{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}
