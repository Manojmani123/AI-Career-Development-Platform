<h1>Assign Skills to Job Role</h1>

<form method="POST">
    {% csrf_token %}

    <label>Select Job Role</label><br>
    <select name="job_role" required>
        <option value="">-- Select Job Role --</option>
        {% for role in job_roles %}
            <option value="{{ role.id }}">{{ role.role_name }}</option>
        {% endfor %}
    </select>

    <br><br>

    <label>Select Required Skills</label><br>
    {% for skill in skills %}
        <input type="checkbox" name="skills" value="{{ skill.id }}">
        {{ skill.skill_name }}<br>
    {% endfor %}

    <br>
    <button type="submit">Assign Skills</button>
</form>

<br>
<a href="{% url 'admin_dashboard' %}">Back to Admin Dashboard</a>
